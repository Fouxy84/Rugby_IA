name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-benchmark pylint black flake8
    
    - name: Lint with Flake8
      run: |
        flake8 src tests scripts --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests scripts --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    
    - name: Format check with Black
      run: black --check src tests scripts --line-length=120
      continue-on-error: true
    
    - name: Run unit tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Run linting with Pylint
      run: |
        pylint src --disable=all --enable=E,F --exit-zero --max-line-length=120
      continue-on-error: true
    
    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          htmlcov/
          .coverage

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: rugby-ia:latest
        outputs: type=docker,dest=/tmp/image.tar
    
    - name: Load Docker image
      run: docker load --input /tmp/image.tar
    
    - name: Test Docker image
      run: |
        docker run --rm rugby-ia:latest python -m pytest tests/ --co -q

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pylint black flake8 radon
    
    - name: Code metrics
      run: |
        echo "=== Cyclomatic Complexity ===" && \
        radon cc src -a || true && \
        echo "=== Maintainability Index ===" && \
        radon mi src || true
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit security check
      run: bandit -r src -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies with Safety
      run: safety check --json || true
      continue-on-error: true

  performance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-benchmark
    
    - name: Run performance benchmarks
      run: pytest tests/test_benchmark.py -v --benchmark-only
      continue-on-error: true
